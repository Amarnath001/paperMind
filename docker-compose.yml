services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:5001
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5001
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - REDIS_URL=${PAPERMIND_REDIS_URL:-${REDIS_URL:-redis://redis:6379/0}}
      - DATABASE_URL=${PAPERMIND_DATABASE_URL:-${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/papermind}}
      # Storage (set STORAGE_PROVIDER=s3 and S3_* in .env for R2/S3)
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_REGION=${S3_REGION:-auto}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: papermind
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=${PAPERMIND_REDIS_URL:-${REDIS_URL:-redis://redis:6379/0}}
      - DATABASE_URL=${PAPERMIND_DATABASE_URL:-${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/papermind}}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_REGION=${S3_REGION:-auto}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    command: celery -A app.celery_app.celery worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
  uploads_data:
